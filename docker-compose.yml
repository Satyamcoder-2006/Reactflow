# IMPORTANT: Before starting Redroid, run these on the Linux host:
# sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
# sudo modprobe ashmem_linux
# These kernel modules are required for Redroid (Android-in-Docker) to boot.

version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: reactflow-postgres
    environment:
      POSTGRES_USER: reactflow
      POSTGRES_PASSWORD: reactflow_dev_password
      POSTGRES_DB: reactflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U reactflow" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reactflow-redis
    command: redis-server --stop-writes-on-bgsave-error no --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  redroid:
    image: redroid/redroid:12.0.0-latest
    container_name: reactflow-redroid
    privileged: true
    command:
      - redroid.gpu=0
      - redroid.width=412
      - redroid.height=892
      - redroid.fps=30
      - redroid.bootstrapPort=9977
    ports:
      - "5555:5555"
    networks:
      - reactflow_emulator
    restart: unless-stopped
    volumes:
      - redroid_data:/data

volumes:
  postgres_data:
  redis_data:
  redroid_data:
  apk_temp:


networks:
  reactflow_emulator:
    driver: bridge
